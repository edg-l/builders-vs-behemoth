; Builders vs Behemoth -- English locale scaffolding.
; Sections mirror the module layout in scripts/ so later phases can add
; entries next to the code that uses them without reshuffling this file.

[mod-name]
builders-vs-behemoth=Builders vs Behemoth

[mod-description]
builders-vs-behemoth=Asymmetric 1-hunter-vs-many-builders scenario: hide, build an economy, defend chokes, and turn the tables on the Behemoth.

; match.lua -- role selection, countdown, win/lose announcements
[bvb-match]
role-selection-title=Choose your role
role-builder=Builder
role-behemoth=Behemoth
role-status-none=No role selected yet.
role-status-builder=Selected: Builder
role-status-behemoth=Selected: Behemoth
start-match=Start Match
countdown=Behemoth arrives in __1__s
builders-win=The Builders have destroyed the Behemoth!
behemoth-wins=The Behemoth has wiped out the Builders!
match-over-title=Match Over
new-match=Start New Match

; economy.lua -- Generator entity/GUI text
[bvb-economy]
generator-name=Generator
generator-tier=Tier __1__ Generator
generator-already-placed=You already have an active Generator.

; prototypes/generator.lua, prototypes/walls.lua, prototypes/turrets.lua --
; entity/item display names (Factorio's standard locale categories; recipe
; display falls back to [item-name] since each recipe shares its item's
; name). Turret ammo items are script-managed only (never shown in a
; crafting/inventory list) but still need a name for the turret's ammo
; slot tooltip.
[entity-name]
bvb-generator=Generator
bvb-wall-1=Tier 1 Wall
bvb-wall-2=Tier 2 Wall
bvb-wall-3=Tier 3 Wall
bvb-turret=Turret

[item-name]
