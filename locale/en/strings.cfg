bvb-wall-1=Tier 1 Wall
bvb-wall-2=Tier 2 Wall
bvb-wall-3=Tier 3 Wall
bvb-turret=Turret
bvb-turret-ammo-1=Turret Ammo (Tier 1)
bvb-turret-ammo-2=Turret Ammo (Tier 2)
bvb-turret-ammo-3=Turret Ammo (Tier 3)

